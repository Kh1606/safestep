<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Room 3D Viewer</title>

    <!-- Load model-viewer -->
    <script type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #111;
      }
      model-viewer {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <model-viewer
      src="colmap_room.glb"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.0"
      environment-image="neutral">
    </model-viewer>
  </body>
</html>

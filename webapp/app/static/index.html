<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MASIL – Seongdong-gu MVP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="/static/css/app.css?v=1">
</head>
<body>
  <div class="panel">
    <div><b>Masil MVP – Seongdong-gu</b></div>
    <small>
      Click 2 points:
      <br/>• 1st click = Start
      <br/>• 2nd click = End
    </small>

    <div class="row">
      <button class="btn2" id="clearPts">Clear points</button>
      <button class="btn2" id="clearRoute">Clear route</button>
    </div>

    <div class="sep"></div>

    <div><b>Mode</b></div>
    <select id="modeSel">
      <option>Default</option>
      <option>Wheelchair</option>
      <option>Elder</option>
      <option>Bicycle</option>
    </select>

    <div class="addrBox">
      <div class="addrRow">
        <div class="addrLabel">Start</div>
        <div class="addrInputRow">
          <input id="startAddr" placeholder="Type start address..." />
          <button id="btnStartSearch">Search</button>
        </div>
        <div id="startResults" class="addrResults"></div>
      </div>
    
      <div class="addrRow">
        <div class="addrLabel">End</div>
        <div class="addrInputRow">
          <input id="endAddr" placeholder="Type destination..." />
          <button id="btnEndSearch">Search</button>
        </div>
        <div id="endResults" class="addrResults"></div>
      </div>
    </div>
    

    <div style="margin-top:10px;"><b>Layers</b></div>
    <div id="layerBox"></div>

    <div id="msg"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { init } from "/static/js/app.js";
    init();
  </script>
</body>
</html>

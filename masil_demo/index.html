<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MASIL Demo Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // 1. Make the map and set starting center/zoom
    const map = L.map('map').setView([37.5798, 126.9773], 16);

    // 2. Add background tiles (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 3. Load route GeoJSON
    fetch('route.geojson')
      .then(response => response.json())
      .then(data => {
        const routeLayer = L.geoJSON(data, {
          style: {
            color: 'blue',
            weight: 5
          },
          onEachFeature: function (feature, layer) {
            if (feature.properties && feature.properties.name) {
              layer.bindPopup('Route: ' + feature.properties.name);
            }
          }
        }).addTo(map);

        // Fit map to route bounds
        map.fitBounds(routeLayer.getBounds());
      });

    // 4. Load hazards GeoJSON
    fetch('hazards.geojson')
      .then(response => response.json())
      .then(data => {
        L.geoJSON(data, {
          pointToLayer: function (feature, latlng) {
            const type = feature.properties.hazard_type;
            let markerOptions = {};

            // Simple coloring by type
            if (type === 'stairs') {
              markerOptions = { radius: 8, color: 'red', fillColor: 'red', fillOpacity: 0.8 };
            } else if (type === 'ramp') {
              markerOptions = { radius: 8, color: 'green', fillColor: 'green', fillOpacity: 0.8 };
            } else {
              markerOptions = { radius: 8, color: 'orange', fillColor: 'orange', fillOpacity: 0.8 };
            }

            return L.circleMarker(latlng, markerOptions);
          },
          onEachFeature: function (feature, layer) {
            const props = feature.properties;
            const popupText =
              'Type: ' + props.hazard_type +
              '<br>Severity: ' + props.severity +
              '<br>Route ID: ' + props.route_id +
              '<br>Position along route: ' + props.position_along_route;
            layer.bindPopup(popupText);
          }
        }).addTo(map);
      });
  </script>
</body>
</html>
